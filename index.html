<style>
  :root{
    --pink: #ffd6ec;
    --pink-deep: #ff8fc7;
    --lav: #e3d4ff;
    --lav-deep: #b18bff;
    --sky: #cdf3ff;
    --sky-deep: #7fdcff;
    --cream: #fffaf3;
    --plum: #6a3f7a;
    --plum-soft: #9a73a8;
    --gold: #ffd66b;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    font-family:'Quicksand', sans-serif;
    background: linear-gradient(135deg, var(--pink) 0%, var(--lav) 45%, var(--sky) 100%);
    background-attachment: fixed;
    color: var(--plum);
    overflow-x:hidden;
    position:relative;
  }

  /* floating sparkles */
  .sparkle{
    position:fixed;
    pointer-events:none;
    font-size: 22px;
    opacity:.6;
    animation: float linear infinite;
    z-index:0;
    user-select:none;
  }
  @keyframes float{
    0%   { transform: translateY(110vh) rotate(0deg); opacity:0; }
    10%  { opacity:.7; }
    90%  { opacity:.7; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity:0; }
  }

  .wrap{
    position:relative;
    z-index:1;
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 18px 60px;
  }

  /* header */
  header{
    text-align:center;
    margin-bottom: 18px;
  }
  .title{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: clamp(28px, 7vw, 46px);
    color: var(--plum);
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(177,139,255,.35);
    margin: 6px 0 2px;
    letter-spacing: 1px;
  }
  .subtitle{
    font-size: 14px;
    color: var(--plum-soft);
    font-weight:600;
  }
  .deco-row{
    font-size: 22px;
    letter-spacing: 10px;
    margin-bottom: 6px;
  }

  /* progress ribbon */
  .ribbon{
    background: #fff;
    border-radius: 999px;
    padding: 10px 18px;
    margin: 20px auto 28px;
    max-width: 560px;
    box-shadow: 0 4px 0 rgba(177,139,255,.25);
    border: 2px solid var(--lav-deep);
  }
  .ribbon-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: 14px;
    color: var(--plum);
    margin-bottom:6px;
  }
  .ribbon-track{
    height: 12px;
    border-radius: 999px;
    background: #ffe9f5;
    overflow:hidden;
    position:relative;
  }
  .ribbon-fill{
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--pink-deep), var(--lav-deep), var(--sky-deep));
    transition: width .4s ease;
    position:relative;
  }
  .ribbon-fill::after{
    content:"";
    position:absolute; inset:0;
    background: repeating-linear-gradient(45deg, rgba(255,255,255,.35) 0 8px, transparent 8px 16px);
  }

  /* battle area */
  .battle{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    flex-wrap: wrap;
    position: relative;
    min-height: 320px;
  }

  .card{
    background: var(--cream);
    border-radius: 26px;
    width: 250px;
    min-height: 250px;
    padding: 26px 18px;
    text-align:center;
    cursor:pointer;
    border: 3px solid transparent;
    box-shadow: 0 8px 0 rgba(177,139,255,.25), 0 8px 24px rgba(154, 115, 168, .18);
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap: 10px;
  }
  .card:hover{
    transform: translateY(-6px) scale(1.02);
    border-color: var(--pink-deep);
    box-shadow: 0 12px 0 rgba(177,139,255,.3), 0 14px 28px rgba(154,115,168,.25);
  }
  .card:active{ transform: translateY(-2px) scale(.99); }
  .card.chosen{
    animation: pop .35s ease;
    border-color: var(--gold);
    background: #fff7e0;
  }
  .card.fading{
    opacity: 0;
    transform: scale(.85);
    transition: opacity .35s ease, transform .35s ease;
  }
  @keyframes pop{
    0%{ transform: scale(1); }
    40%{ transform: scale(1.08); }
    100%{ transform: scale(1.02); }
  }

  .card .emoji{ font-size: 36px; }
  .card .artist{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: 19px;
    color: var(--plum);
    line-height:1.25;
  }
  .card .album{
    font-size: 15px;
    font-weight:600;
    color: var(--plum-soft);
    font-style: italic;
    line-height:1.3;
  }
  .card .year{
    margin-top:4px;
    display:inline-block;
    background: linear-gradient(90deg, var(--lav), var(--sky));
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight:700;
    color: var(--plum);
  }

  .vs{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 26px;
    color: #fff;
    background: linear-gradient(135deg, var(--pink-deep), var(--lav-deep));
    width: 56px; height:56px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 0 rgba(154,115,168,.3);
    flex-shrink:0;
    animation: wiggle 2.4s ease-in-out infinite;
  }
  @keyframes wiggle{
    0%,100%{ transform: rotate(-6deg); }
    50%{ transform: rotate(6deg); }
  }

  /* footer controls */
  .controls{
    text-align:center;
    margin-top: 26px;
    display:flex;
    gap: 12px;
    justify-content:center;
    flex-wrap:wrap;
  }
  button.ctrl{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size: 14px;
    color: var(--plum);
    background: #fff;
    border: 2px solid var(--lav-deep);
    border-radius: 999px;
    padding: 10px 22px;
    cursor:pointer;
    box-shadow: 0 4px 0 rgba(177,139,255,.25);
    transition: transform .12s ease;
  }
  button.ctrl:hover{ transform: translateY(-2px); }
  button.ctrl:active{ transform: translateY(1px); box-shadow: 0 2px 0 rgba(177,139,255,.25); }

  /* winner screen */
  .winner-screen{
    text-align:center;
    padding: 40px 20px;
  }
  .winner-screen .crown{
    font-size: 60px;
    display:block;
    margin-bottom: 6px;
    animation: bounce 1.4s ease-in-out infinite;
  }
  @keyframes bounce{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-12px); }
  }
  .winner-card{
    background: var(--cream);
    border-radius: 30px;
    border: 4px solid var(--gold);
    padding: 34px 26px;
    max-width: 360px;
    margin: 0 auto;
    box-shadow: 0 10px 0 rgba(255,214,107,.35), 0 14px 30px rgba(154,115,168,.25);
  }
  .winner-card .artist{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size: 26px;
    color: var(--plum);
  }
  .winner-card .album{
    font-style: italic;
    font-weight:600;
    color: var(--plum-soft);
    margin-top: 6px;
    font-size: 17px;
  }
  .winner-card .year{
    margin-top:10px;
    display:inline-block;
    background: linear-gradient(90deg, var(--gold), var(--pink-deep));
    color:#fff;
    border-radius: 999px;
    padding: 5px 16px;
    font-size: 13px;
    font-weight:700;
  }

  .footer-note{
    text-align:center;
    margin-top: 30px;
    font-size: 12px;
    color: var(--plum-soft);
    opacity:.8;
  }

  @media (max-width: 540px){
    .vs{ order: 99; }
    .card{ width: 100%; max-width: 320px; }
  }
</style>

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function roundName(size){
  switch(size){
    case 256: return "Turno 1 — Primo Round 🌸";
    case 128: return "Turno 2 — Sedicesimi 💜";
    case 64:  return "Turno 3 — Ottavi ✨";
    case 32:  return "Turno 4 — Sedicesimi+ 🌈";
    case 16:  return "Ottavi di Finale 🎀";
    case 8:   return "Quarti di Finale 🍓";
    case 4:   return "Semifinale 💎";
    case 2:   return "🏆 GRAN FINALE 🏆";
    default:  return "Round";
  }
}

function init(){
  currentRound = shuffle(albums);
  nextRound = [];
  matchIndex = 0;
  history = [];
  render();
}

function render(){
  totalInRound = currentRound.length;

  if(totalInRound === 1){
    showWinner(currentRound[0]);
    return;
  }

  const a = currentRound[matchIndex];
  const b = currentRound[matchIndex+1];

  roundLabel.textContent = roundName(totalInRound);
  matchLabel.textContent = `Match ${Math.floor(matchIndex/2)+1} / ${totalInRound/2}`;

  // overall progress across whole tournament (255 matches total)
  const matchesDoneBefore = 256 - totalInRound; // matches resolved in earlier rounds
  const doneThisRound = matchIndex/2;
  const totalMatches = 255;
  const doneSoFar = matchesDoneBefore + doneThisRound;
  ribbonFill.style.width = Math.min(100, (doneSoFar/totalMatches)*100) + "%";

  battleEl.innerHTML = `
    <div class="card" data-pick="a">
      <div class="emoji">${randomEmoji()}</div>
      <div class="artist">${esc(a[0])}</div>

      <div class="artist">${esc(b[0])}</div>
      <div class="album">${esc(b[1])}</div>
      <div class="year">${b[2]}</div>
    </div>

    card.addEventListener('click', onPick);
  });
}

function randomEmoji(){
  return EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
}

function esc(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function onPick(e){
  const cards = battleEl.querySelectorAll('.card');
  const pick = e.currentTarget.dataset.pick;
  const a = currentRound[matchIndex];
  const b = currentRound[matchIndex+1];
  const winner = pick === 'a' ? a : b;
  const loserCard = pick === 'a' ? cards[1] : cards[0];
  const winnerCard = pick === 'a' ? cards[0] : cards[1];

  winnerCard.classList.add('chosen');
  loserCard.classList.add('fading');

  cards.forEach(c=>c.style.pointerEvents = 'none');

  // save state for undo
  history.push({
    matchIndex, currentRound: currentRound.slice(), nextRound: nextRound.slice()
  });

  nextRound.push(winner);
  matchIndex += 2;

  setTimeout(()=>{
    if(matchIndex >= currentRound.length){
      currentRound = nextRound;
      nextRound = [];
      matchIndex = 0;
    }
    render();
  }, 420);
}

function showWinner(winner){
  roundLabel.textContent = "🏆 ABBIAMO UN VINCITORE 🏆";
  matchLabel.textContent = "";
  ribbonFill.style.width = "100%";

  battleEl.innerHTML = `
    <div class="winner-screen">
      <span class="crown">👑</span>
      <div class="winner-card">
        <div class="emoji" style="font-size:40px;">${randomEmoji()}</div>
        <div class="artist">${esc(winner[0])}</div>
        <div class="album">${esc(winner[1])}</div>
        <div class="year">${winner[2]}</div>
      </div>
      <p style="margin-top:18px; font-weight:600; color:var(--plum-soft);">
        è il campione del tuo torneo uwu ✧･ﾞ: *✧･ﾞ:*
      </p>
    </div>
  `;
}

document.getElementById('shuffleBtn').addEventListener('click', init);

document.getElementById('undoBtn').addEventListener('click', ()=>{
  if(history.length === 0) return;
  const last = history.pop();
  currentRound = last.currentRound;
  nextRound = last.nextRound;
  matchIndex = last.matchIndex;
  render();
});

/* floating background sparkles */
function spawnSparkle(){
  const s = document.createElement('div');
  s.className = 'sparkle';
  s.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  s.style.left = Math.random()*100 + "vw";
  const duration = 10 + Math.random()*14;
  s.style.animationDuration = duration + "s";
  s.style.fontSize = (16 + Math.random()*22) + "px";
  document.body.appendChild(s);
  setTimeout(()=> s.remove(), duration*1000 + 500);
}
for(let i=0;i<10;i++){
  setTimeout(spawnSparkle, i*800);
}
setInterval(spawnSparkle, 1800);

/* go! */
init();
</script>
